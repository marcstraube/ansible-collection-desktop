---
#
# Terminal File Managers
#

- name: Install | vifm
  ansible.builtin.package:
    name: '{{ __filemanagers_vifm_package }}'
    state: present
  when:
    - filemanagers_vifm_enabled | bool
  retries: 3
  delay: 5

- name: Install | Midnight Commander
  ansible.builtin.package:
    name: '{{ __filemanagers_mc_package }}'
    state: present
  when:
    - filemanagers_mc_enabled | bool
  retries: 3
  delay: 5

- name: Install | ranger
  ansible.builtin.package:
    name: '{{ __filemanagers_ranger_package }}'
    state: present
  when:
    - filemanagers_ranger_enabled | bool
  retries: 3
  delay: 5

- name: Install | nnn
  ansible.builtin.package:
    name: '{{ __filemanagers_nnn_package }}'
    state: present
  when:
    - filemanagers_nnn_enabled | bool
  retries: 3
  delay: 5

- name: Install | lf
  ansible.builtin.package:
    name: '{{ __filemanagers_lf_package }}'
    state: present
  when:
    - filemanagers_lf_enabled | bool
    - __filemanagers_lf_package | default('') | length > 0
  retries: 3
  delay: 5

