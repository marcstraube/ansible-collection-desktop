---
# Respects mode: managed | initial | disabled

- name: Users | Bootstrap Firefox profile
  ansible.builtin.include_tasks:
    file: users_firefox_family.yml
    apply:
      tags:
        - browser
        - browser:configure
  vars:
    __ff_config_dir: '.mozilla/firefox'
    __ff_profile_pattern: '{{ __browser_firefox_profile_pattern }}'
    __ff_profile_dirname: '{{ __browser_firefox_profile_dirname }}'
    __ff_install_hash: '{{ __browser_firefox_install_hash }}'
    __ff_profile_name: 'default-release'
    __ff_preferences: '{{ browser_firefox_preferences }}'
  tags:
    - browser
    - browser:configure
  loop: '{{ browser_users }}'
  loop_control:
    loop_var: browser_user
    label: '{{ browser_user.username }}'
  when:
    - browser_firefox_enabled | bool
    - browser_firefox_user_js_enabled | bool
    - (browser_user.mode | default(browser_user_config_mode)) != 'disabled'
    - >-
      (browser_user.mode | default(browser_user_config_mode)) == 'managed'
      or ((browser_user.mode | default(browser_user_config_mode)) == 'initial'
          and browser_user.username in (__users_newly_created | default([])))

- name: Users | Bootstrap LibreWolf profile
  ansible.builtin.include_tasks:
    file: users_firefox_family.yml
    apply:
      tags:
        - browser
        - browser:configure
  vars:
    __ff_config_dir: '.librewolf'
    __ff_profile_pattern: '{{ __browser_librewolf_profile_pattern }}'
    __ff_profile_dirname: '{{ __browser_librewolf_profile_dirname }}'
    __ff_install_hash: '{{ __browser_librewolf_install_hash }}'
    __ff_profile_name: 'default'
    __ff_preferences: '{{ browser_librewolf_preferences }}'
  tags:
    - browser
    - browser:configure
  loop: '{{ browser_users }}'
  loop_control:
    loop_var: browser_user
    label: '{{ browser_user.username }}'
  when:
    - browser_librewolf_enabled | bool
    - browser_librewolf_user_js_enabled | bool
    - ansible_facts['os_family'] == 'Archlinux'
    - (browser_user.mode | default(browser_user_config_mode)) != 'disabled'
    - >-
      (browser_user.mode | default(browser_user_config_mode)) == 'managed'
      or ((browser_user.mode | default(browser_user_config_mode)) == 'initial'
          and browser_user.username in (__users_newly_created | default([])))

- name: Users | Include default browser handler config
  ansible.builtin.include_tasks:
    file: users_default_handler.yml
    apply:
      tags:
        - browser
        - browser:configure
        - browser:default
  tags:
    - browser
    - browser:configure
    - browser:default
  loop: '{{ browser_users }}'
  loop_control:
    loop_var: browser_user
    label: '{{ browser_user.username }}'
  when:
    - browser_default | length > 0
    - (browser_user.mode | default(browser_user_config_mode)) != 'disabled'
    - >-
      (browser_user.mode | default(browser_user_config_mode)) == 'managed'
      or ((browser_user.mode | default(browser_user_config_mode)) == 'initial'
          and browser_user.username in (__users_newly_created | default([])))
