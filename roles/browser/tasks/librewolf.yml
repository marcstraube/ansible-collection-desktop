---
- name: LibreWolf | Ensure policies directory exists (Arch)
  ansible.builtin.file:
    path: '{{ __browser_librewolf_policies_path }}'
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __browser_librewolf_policies_path | length > 0

- name: LibreWolf | Deploy policies.json (Arch)
  ansible.builtin.template:
    src: librewolf-policies.json.j2
    dest: '{{ __browser_librewolf_policies_path }}/policies.json'
    owner: root
    group: root
    mode: '0644'
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __browser_librewolf_policies_path | length > 0

- name: LibreWolf | Configuration not available notice
  ansible.builtin.debug:
    msg: >-
      LibreWolf policy configuration is only available on Arch Linux.
      For other distributions, configure manually or use Flatpak overrides.
  when:
    - ansible_facts['os_family'] != 'Archlinux'
    - __browser_librewolf_policies_path | length == 0
