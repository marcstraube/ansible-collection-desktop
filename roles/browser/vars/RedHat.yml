---
# Packages
__browser_firefox_package: 'firefox'
__browser_firefox_i18n_package: 'firefox-langpack-{{ browser_firefox_i18n }}'
__browser_chromium_package: 'chromium'
__browser_tor_package: ''                 # Not available on Rocky

# Policy paths
__browser_firefox_policies_path: '/usr/lib64/firefox/distribution'
__browser_firefox_autoconfig_path: '/usr/lib64/firefox/defaults/pref'
__browser_firefox_config_path: '/usr/lib64/firefox'
__browser_librewolf_policies_path: ''
__browser_chromium_policies_path: '/etc/chromium/policies'
__browser_brave_policies_path: ''

# Firefox profile directory pattern (for find)
__browser_firefox_profile_pattern: '*.default-release'
__browser_librewolf_profile_pattern: '*.default-default'
