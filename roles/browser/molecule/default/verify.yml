---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Verify | Load OS-specific role vars
      ansible.builtin.include_vars: '{{ item }}'
      with_first_found:
        - files:
            - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["distribution"] }}.yml'
            - '{{ ansible_facts["os_family"] }}.yml'
          paths:
            - '{{ playbook_dir }}/../../vars'
          skip: true

    #
    # Firefox Verification
    #

    - name: Verify | Check Firefox package installed
      ansible.builtin.package:
        name: >-
          {{ (ansible_facts['os_family'] == 'Debian') | ternary('firefox-esr', 'firefox') }}
        state: present
      check_mode: true
      register: __browser_verify_firefox

    - name: Verify | Assert Firefox installed
      ansible.builtin.assert:
        that:
          - not __browser_verify_firefox.changed
        fail_msg: 'Firefox is not installed'

    #
    # Firefox Policies Verification
    #

    - name: Verify | Set Firefox policies path fact
      ansible.builtin.set_fact:
        __browser_verify_policies_path: >-
          {% if ansible_facts['os_family'] == 'Archlinux' %}/usr/lib/firefox/distribution{%
          elif ansible_facts['os_family'] == 'Debian' %}/etc/firefox-esr/policies{%
          else %}/usr/lib64/firefox/distribution{% endif %}

    - name: Verify | Check Firefox policies.json exists
      ansible.builtin.stat:
        path: '{{ __browser_verify_policies_path | trim }}/policies.json'
      register: __browser_verify_firefox_policies

    - name: Verify | Assert Firefox policies.json exists
      ansible.builtin.assert:
        that:
          - __browser_verify_firefox_policies.stat.exists
        fail_msg: 'Firefox policies.json not found'

    - name: Verify | Check Firefox policies.json contains uBlock Origin
      ansible.builtin.command:
        cmd: 'grep -c uBlock0 {{ __browser_verify_policies_path | trim }}/policies.json'
      register: __browser_verify_ublock
      changed_when: false

    - name: Verify | Assert uBlock Origin in Firefox policies
      ansible.builtin.assert:
        that:
          - __browser_verify_ublock.stdout | int > 0
        fail_msg: 'uBlock Origin not found in Firefox policies.json'

    - name: Verify | Validate Firefox policies.json is valid JSON
      ansible.builtin.command:
        cmd: 'python3 -c "import json; json.load(open(''{{ __browser_verify_policies_path | trim }}/policies.json''))"'
      register: __browser_verify_firefox_policies_json
      changed_when: false

    #
    # Chromium Verification
    #

    - name: Verify | Check Chromium package installed
      ansible.builtin.package:
        name: chromium
        state: present
      check_mode: true
      register: __browser_verify_chromium

    - name: Verify | Assert Chromium installed
      ansible.builtin.assert:
        that:
          - not __browser_verify_chromium.changed
        fail_msg: 'Chromium is not installed'

    - name: Verify | Check Chromium policies.json exists
      ansible.builtin.stat:
        path: /etc/chromium/policies/managed/policies.json
      register: __browser_verify_chromium_policies

    - name: Verify | Assert Chromium policies.json exists
      ansible.builtin.assert:
        that:
          - __browser_verify_chromium_policies.stat.exists
        fail_msg: 'Chromium policies.json not found'

    - name: Verify | Validate Chromium policies.json is valid JSON
      ansible.builtin.command:
        cmd: 'python3 -c "import json; json.load(open(''/etc/chromium/policies/managed/policies.json''))"'
      register: __browser_verify_chromium_policies_json
      changed_when: false

    #
    # Firefox Autoconfig Verification
    #

    - name: Verify | Set Firefox config path fact
      ansible.builtin.set_fact:
        __browser_verify_config_path: >-
          {% if ansible_facts['os_family'] == 'Archlinux' %}/usr/lib/firefox{%
          elif ansible_facts['os_family'] == 'Debian' %}/usr/lib/firefox-esr{%
          else %}/usr/lib64/firefox{% endif %}

    - name: Verify | Check autoconfig.js exists
      ansible.builtin.stat:
        path: '{{ __browser_verify_config_path | trim }}/defaults/pref/autoconfig.js'
      register: __browser_verify_autoconfig

    - name: Verify | Assert autoconfig.js exists
      ansible.builtin.assert:
        that:
          - __browser_verify_autoconfig.stat.exists
        fail_msg: 'Firefox autoconfig.js not found'

    - name: Verify | Check firefox.cfg exists
      ansible.builtin.stat:
        path: '{{ __browser_verify_config_path | trim }}/firefox.cfg'
      register: __browser_verify_firefoxcfg

    - name: Verify | Assert firefox.cfg exists
      ansible.builtin.assert:
        that:
          - __browser_verify_firefoxcfg.stat.exists
        fail_msg: 'Firefox firefox.cfg not found'

    #
    # Default Browser Handler (mimeapps.list)
    #

    - name: Verify | Check mimeapps.list exists for test user
      ansible.builtin.stat:
        path: /home/browser_test_user/.config/mimeapps.list
      register: __browser_verify_mimeapps

    - name: Verify | Assert mimeapps.list exists
      ansible.builtin.assert:
        that:
          - __browser_verify_mimeapps.stat.exists
        fail_msg: 'mimeapps.list not created for browser_test_user'

    - name: Verify | Read mimeapps.list content
      ansible.builtin.slurp:
        src: /home/browser_test_user/.config/mimeapps.list
      register: __browser_verify_mimeapps_content

    - name: Verify | Assert http handler is firefox.desktop
      ansible.builtin.assert:
        that:
          - (__browser_verify_mimeapps_content.content | b64decode)
            is search('x-scheme-handler/http\s*=\s*firefox\.desktop')
        fail_msg: 'x-scheme-handler/http not set to firefox.desktop'

    - name: Verify | Assert https handler is firefox.desktop
      ansible.builtin.assert:
        that:
          - (__browser_verify_mimeapps_content.content | b64decode)
            is search('x-scheme-handler/https\s*=\s*firefox\.desktop')
        fail_msg: 'x-scheme-handler/https not set to firefox.desktop'

    #
    # Firefox Profile Bootstrap (filesystem-based)
    #

    - name: Verify | Check Firefox profile directory exists
      ansible.builtin.stat:
        path: /home/browser_test_user/.mozilla/firefox/{{ __browser_firefox_profile_dirname }}
      register: __browser_verify_firefox_profile

    - name: Verify | Assert Firefox profile directory exists
      ansible.builtin.assert:
        that:
          - __browser_verify_firefox_profile.stat.exists
          - __browser_verify_firefox_profile.stat.isdir
        fail_msg: 'Firefox bootstrap profile directory not created'

    - name: Verify | Check Firefox profiles.ini exists
      ansible.builtin.stat:
        path: /home/browser_test_user/.mozilla/firefox/profiles.ini
      register: __browser_verify_firefox_profiles_ini

    - name: Verify | Assert Firefox profiles.ini exists
      ansible.builtin.assert:
        that:
          - __browser_verify_firefox_profiles_ini.stat.exists
        fail_msg: 'Firefox profiles.ini not created'

    - name: Verify | Read Firefox profiles.ini content
      ansible.builtin.slurp:
        src: /home/browser_test_user/.mozilla/firefox/profiles.ini
      register: __browser_verify_firefox_profiles_ini_content

    - name: Verify | Assert profiles.ini registers the profile correctly
      ansible.builtin.assert:
        that:
          - "'Path=' + __browser_firefox_profile_dirname in __profiles_ini_text"
          - "'Default=1' in __profiles_ini_text"
          - "'Version=2' in __profiles_ini_text"
          - "'[Install' + __browser_firefox_install_hash + ']' in __profiles_ini_text"
          - "'Default=' + __browser_firefox_profile_dirname in __profiles_ini_text"
        fail_msg: 'profiles.ini does not register the bootstrap profile correctly'
      vars:
        __profiles_ini_text: '{{ __browser_verify_firefox_profiles_ini_content.content | b64decode }}'

    - name: Verify | Check Firefox user.js exists in profile
      ansible.builtin.stat:
        path: /home/browser_test_user/.mozilla/firefox/{{ __browser_firefox_profile_dirname }}/user.js
      register: __browser_verify_firefox_user_js

    - name: Verify | Assert Firefox user.js deployed
      ansible.builtin.assert:
        that:
          - __browser_verify_firefox_user_js.stat.exists
        fail_msg: 'Firefox user.js not deployed into profile'
