---
- name: Install | VeraCrypt packages
  ansible.builtin.package:
    name: '{{ __security_apps_packages.veracrypt }}'
    state: present
  when:
    - security_apps_veracrypt_enabled | bool
    - __security_apps_packages.veracrypt is defined
  retries: 3
  delay: 5

- name: Install | ClamTk packages
  ansible.builtin.package:
    name: '{{ __security_apps_packages.clamtk }}'
    state: present
  when:
    - security_apps_clamtk_enabled | bool
    - __security_apps_packages.clamtk is defined
  retries: 3
  delay: 5

- name: Install | Gufw packages
  ansible.builtin.package:
    name: '{{ __security_apps_packages.gufw }}'
    state: present
  when:
    - security_apps_gufw_enabled | bool
    - __security_apps_packages.gufw is defined
  retries: 3
  delay: 5

- name: Install | Cypherock CySync from AUR (Arch)
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: '{{ __security_apps_aur_packages.cypherock }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - security_apps_cypherock_enabled | bool
  retries: 3
  delay: 5

- name: Install | Ledger Live from AUR (Arch)
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: '{{ __security_apps_aur_packages.ledger }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - security_apps_ledger_enabled | bool
  retries: 3
  delay: 5

- name: Install | Trezor Suite from AUR (Arch)
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: '{{ __security_apps_aur_packages.trezor }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - security_apps_trezor_enabled | bool
  retries: 3
  delay: 5
