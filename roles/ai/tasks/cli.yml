---
#
# AI CLI Tools Installation
#

# Claude Code

- name: CLI | Install Claude Code from AUR (Arch)
  become: true
  become_user: 'aur_builder'
  kewlfft.aur.aur:
    name: '{{ __ai_aur_packages.claude_code }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - ai_claude_code_enabled | bool
  retries: 3
  delay: 5

- name: CLI | Install Claude Code via npm (non-Arch)
  become: true
  community.general.npm:
    name: '@anthropic-ai/claude-code'
    global: true
    state: present
  when:
    - ansible_facts['os_family'] != 'Archlinux'
    - ai_claude_code_enabled | bool
  retries: 3
  delay: 5

