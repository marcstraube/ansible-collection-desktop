# OpenAI Codex

- name: CLI | Install OpenAI Codex (Arch)
  become: true
  ansible.builtin.package:
    name: '{{ __ai_codex_package }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - ai_codex_enabled | bool
    - __ai_codex_package | length > 0
  retries: 3
  delay: 5

- name: CLI | Install OpenAI Codex via npm (non-Arch)
  become: true
  community.general.npm:
    name: '@openai/codex'
    global: true
    state: present
  when:
    - ansible_facts['os_family'] != 'Archlinux'
    - ai_codex_enabled | bool
  retries: 3
  delay: 5

