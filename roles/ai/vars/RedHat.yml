---
#
# RedHat/Rocky-specific variables for AI tools
#

# CLI Tools (via npm/pipx on RedHat)
__ai_codex_package: ''

# CLI Tools — AUR-only on Arch, no-op elsewhere
__ai_claude_cowork_service_package: ''
__ai_antigravity_cli_package: ''

# Desktop Apps
__ai_claude_desktop_package: ''
__ai_antigravity_package: ''
__ai_opencode_desktop_url: >-
  https://github.com/anomalyco/opencode/releases/latest/download/opencode-desktop-linux-x86_64.rpm

# Local AI
__ai_ollama_package: ''
__ai_lmstudio_package: ''

# Service names
__ai_ollama_service: 'ollama.service'

# ComfyUI is not supported on RedHat-family hosts: no complete native PyTorch
# stack (torch/torchvision/torchaudio) exists in EPEL, and the upstream pip
# wheel index is fragile against Python version drift. comfyui-other.yml fails
# fast with a clear message. See issue #122.
