---
#
# Debian-specific variables for AI tools
#

# CLI Tools (via npm/pipx on Debian)
__ai_codex_package: ''

# CLI Tools — AUR-only on Arch, no-op elsewhere
__ai_claude_cowork_service_package: ''
__ai_antigravity_cli_package: ''

# Desktop Apps
__ai_claude_desktop_package: ''
__ai_antigravity_package: ''
__ai_opencode_desktop_url: >-
  https://github.com/anomalyco/opencode/releases/latest/download/opencode-desktop-linux-amd64.deb

# Local AI
__ai_ollama_package: ''
__ai_lmstudio_package: ''

# Service names
__ai_ollama_service: 'ollama.service'

# ComfyUI
__ai_comfyui_python: 'python3'
__ai_comfyui_venv_packages:
  - 'python3'
  - 'python3-venv'
  - 'python3-pip'
  - 'git'

# ComfyUI — native PyTorch packages (manual install flow). torchvision and
# torchaudio are GPU-agnostic; only the base torch package differs by backend.
# AMD/ROCm has no Debian package, so it is rejected in comfyui-other.yml.
__ai_comfyui_torch_packages:
  nvidia:
    - 'python3-torch-cuda'
    - 'python3-torchvision'
    - 'python3-torchaudio'
  cpu:
    - 'python3-torch'
    - 'python3-torchvision'
    - 'python3-torchaudio'
