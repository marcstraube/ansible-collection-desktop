---
#
# Role Control
#

# Enable the gaming role
gaming_enabled: true

#
# Gaming Platforms
#

# Lutris gaming platform
gaming_lutris_enabled: true

# Steam game store
gaming_steam_enabled: false

# Heroic Games Launcher (Epic/GOG)
gaming_heroic_enabled: false

#
# Emulation
#

# RetroArch emulator frontend
gaming_retroarch_enabled: true

# Playback game recording/replay viewer
gaming_playback_enabled: true

# Playback package variant (Arch AUR): 'flatpak' installs the official
# Flatpak bundle (playback-flatpak), 'appimage' the AppImage repack
# (playback-appimage). The variants conflict; the unselected one is
# removed.
gaming_playback_variant: 'flatpak'

# PCSX2 PlayStation 2 emulator
gaming_pcsx2_enabled: false

# Dolphin GameCube/Wii emulator
gaming_dolphin_enabled: false

#
# Game Streaming
#

# Moonlight NVIDIA GameStream client
gaming_moonlight_enabled: false
