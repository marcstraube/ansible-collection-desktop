        fail_msg: 'Playback binary not found at /usr/bin/playback'
      when: gaming_playback_enabled | default(false) | bool

    #
    # PCSX2
    #

    - name: Verify | Check PCSX2 binary exists
      ansible.builtin.stat:
        path: /usr/bin/pcsx2
      register: __gaming_pcsx2_binary
      when: gaming_pcsx2_enabled | default(false) | bool

    - name: Verify | Assert PCSX2 is installed
      ansible.builtin.assert:
        that: __gaming_pcsx2_binary.stat.exists
        fail_msg: 'PCSX2 binary not found at /usr/bin/pcsx2'
      when: gaming_pcsx2_enabled | default(false) | bool

    #
    # Dolphin Emulator
    #

    - name: Verify | Check Dolphin binary exists
      ansible.builtin.stat:
        path: /usr/bin/dolphin-emu
      register: __gaming_dolphin_binary
      when: gaming_dolphin_enabled | default(false) | bool

    - name: Verify | Assert Dolphin Emulator is installed
      ansible.builtin.assert:
        that: __gaming_dolphin_binary.stat.exists
        fail_msg: 'Dolphin binary not found at /usr/bin/dolphin-emu'
      when: gaming_dolphin_enabled | default(false) | bool

    #
    # Moonlight
    #

    - name: Verify | Check Moonlight binary exists
      ansible.builtin.stat:
