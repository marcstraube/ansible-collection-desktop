---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    #
    # Role Completion
    #

    - name: Verify | Confirm role completed successfully
      ansible.builtin.assert:
        that: true
        fail_msg: 'gaming role did not complete'

    #
    # Lutris
    #

    - name: Verify | Check Lutris binary exists
      ansible.builtin.stat:
        path: /usr/bin/lutris
      register: __gaming_lutris_binary
      when: gaming_lutris_enabled | default(false) | bool

    - name: Verify | Assert Lutris is installed
      ansible.builtin.assert:
        that: __gaming_lutris_binary.stat.exists
        fail_msg: 'Lutris binary not found at /usr/bin/lutris'
      when: gaming_lutris_enabled | default(false) | bool

    #
    # Steam
    #

    - name: Verify | Check Steam binary exists
      ansible.builtin.stat:
        path: /usr/bin/steam
      register: __gaming_steam_binary
      when: gaming_steam_enabled | default(false) | bool

    - name: Verify | Assert Steam is installed
      ansible.builtin.assert:
        that: __gaming_steam_binary.stat.exists
        fail_msg: 'Steam binary not found at /usr/bin/steam'
      when: gaming_steam_enabled | default(false) | bool

    #
    # Heroic Games Launcher
