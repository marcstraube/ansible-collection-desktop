    - name: Verify | Check Heroic binary exists
      ansible.builtin.stat:
        path: /usr/bin/heroic
      register: __gaming_heroic_binary
      when: gaming_heroic_enabled | default(false) | bool

    - name: Verify | Assert Heroic Games Launcher is installed
      ansible.builtin.assert:
