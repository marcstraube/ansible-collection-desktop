---
#
# Package Installation
#

- name: Install | Lutris
  ansible.builtin.package:
    name: '{{ __gaming_lutris_package }}'
    state: present
  when:
    - gaming_lutris_enabled | bool
    - __gaming_lutris_package | default('') | length > 0
  retries: 3
  delay: 5

- name: Install | Assert multilib repo is enabled for Steam (Arch)
  ansible.builtin.assert:
    that:
      - pacman_multilib_enabled | default(false) | bool
    fail_msg: >-
      Steam on Arch lives in the multilib repository and pulls lib32
      dependencies. Set `pacman_multilib_enabled: true` in inventory
      and run the `marcstraube.common.package_management` role first
      (or use the `base-system` tag).
  when:
    - gaming_steam_enabled | bool
    - ansible_facts['os_family'] == 'Archlinux'

- name: Install | Steam
  ansible.builtin.package:
    name: '{{ __gaming_steam_package }}'
    state: present
  when:
    - gaming_steam_enabled | bool
    - __gaming_steam_package | default('') | length > 0
  retries: 3
  delay: 5

- name: Install | RetroArch
  ansible.builtin.package:
    name: '{{ __gaming_retroarch_package }}'
    state: present
  when:
    - gaming_retroarch_enabled | bool
    - __gaming_retroarch_package | default('') | length > 0
  retries: 3
  delay: 5

- name: Install | PCSX2
  ansible.builtin.package:
    name: '{{ __gaming_pcsx2_package }}'
    state: present
  when:
    - gaming_pcsx2_enabled | bool
    - __gaming_pcsx2_package | default('') | length > 0
    - ansible_facts['os_family'] != 'Archlinux'
  retries: 3
  delay: 5

- name: Install | Dolphin Emulator
  ansible.builtin.package:
    name: '{{ __gaming_dolphin_package }}'
    state: present
  when:
    - gaming_dolphin_enabled | bool
    - __gaming_dolphin_package | default('') | length > 0
  retries: 3
  delay: 5

- name: Install | Moonlight
  ansible.builtin.package:
    name: '{{ __gaming_moonlight_package }}'
    state: present
  when:
    - gaming_moonlight_enabled | bool
    - __gaming_moonlight_package | default('') | length > 0
  retries: 3
  delay: 5

#
# AUR Packages (Arch Linux)
#

- name: Install | Heroic Games Launcher from AUR (Arch)
  become: true
  become_user: "{{ aur_builder_user | default('aur_builder') }}"
  kewlfft.aur.aur:
    name: '{{ __gaming_aur_packages.heroic }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - gaming_heroic_enabled | bool
  retries: 3
  delay: 5

# The Playback variants conflict with each other, which paru cannot
# resolve under --noconfirm — remove the unselected variant before
# installing the selected one (variant exclusive).
- name: Install | Remove unselected Playback variant (Arch)
  community.general.pacman:
    name: >-
      {{ __gaming_aur_packages.playback
         | dict2items
         | rejectattr('key', 'equalto', gaming_playback_variant)
         | map(attribute='value') | flatten | list }}
    state: absent
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - gaming_playback_enabled | bool

- name: Install | Playback from AUR (Arch)
  become: true
  become_user: "{{ aur_builder_user | default('aur_builder') }}"
  kewlfft.aur.aur:
    name: '{{ __gaming_aur_packages.playback[gaming_playback_variant] }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - gaming_playback_enabled | bool
  retries: 3
  delay: 5

- name: Install | PCSX2 from AUR (Arch)
  become: true
  become_user: "{{ aur_builder_user | default('aur_builder') }}"
  kewlfft.aur.aur:
    name: '{{ __gaming_aur_packages.pcsx2 }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - gaming_pcsx2_enabled | bool
  retries: 3
  delay: 5
