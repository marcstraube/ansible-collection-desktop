---
#
# Role Control
#

# Enable the development role
development_enabled: true

#
# Version Control
#

# Enable git installation
development_git_enabled: true

# Enable git-lfs support
development_git_lfs_enabled: true

# Enable GitHub CLI (gh)
development_github_cli_enabled: true

# Enable GitLab CLI (glab)
development_gitlab_cli_enabled: true

# Git global configuration
development_git_config:
  core.editor: 'nvim'
  init.defaultBranch: 'main'
  pull.rebase: 'true'
  push.autoSetupRemote: 'true'

#
# Programming Languages
#

# Python

# Enable Python installation
development_python_enabled: true

# Python tools to install via pipx (Debian/RedHat only, Arch uses native packages)
development_python_tools: []
# Example:
#   development_python_tools:
#     - 'black'
#     - 'flake8'
#     - 'mypy'

# Node.js (installed via marcstraube.common.nodejs role)

# Enable Node.js
development_nodejs_enabled: true

# Rust

# Enable Rust installation
development_rust_enabled: false

# Rust components to install via rustup (Debian/RedHat only, Arch uses native packages)
development_rust_components: []
# Example:
#   development_rust_components:
#     - 'rustfmt'
#     - 'clippy'

# Go

# Enable Go installation
development_go_enabled: false

# Java (OpenJDK)

# Enable Java installation (version pinning is per-OS — see vars/{distro}.yml;
# for per-project version control use mise/sdkman/asdf instead)
development_java_enabled: false

# C/C++

# Enable the core C/C++ tooling block (clang incl. clang-format,
# clang-tidy and clangd, gdb, pkgconf)
development_c_enabled: false

# Enable codelldb LLDB debug adapter (AUR only — no-op on Debian/RedHat)
development_c_codelldb_enabled: false

# Enable ccache compiler cache
development_c_ccache_enabled: false

# Enable valgrind memory and leak debugger
development_c_valgrind_enabled: false

# Enable cppcheck static analysis
development_c_cppcheck_enabled: false

# Enable bear (generates compile_commands.json for non-CMake projects)
development_c_bear_enabled: false

# Gameboy development
#
# GBDK-2020 and GB Studio are AUR only — no-op on Debian/RedHat.

# Enable the GBDK-2020 toolchain (SDCC-based cross-compiler and
# libraries for GB / GBC / SGB)
development_gb_gbdk_enabled: false

# Enable the GB Studio visual game maker
development_gb_gbstudio_enabled: false

# devkitPro — Nintendo console homebrew toolchains
#
# devkitARM / devkitPPC / devkitA64 cross-compilers distributed via
# devkitPro's own pacman repositories (dkp-libs, dkp-linux). Registering
# those repos is package_management's job (it owns /etc/pacman.conf); to
# enable them, merge development_devkitpro_repositories into
# `pacman_custom_repositories` in your inventory — this role then
# installs the signing keyring, the system-wide environment, and the
# requested platform groups. Arch only — a no-op on Debian/RedHat until
# the cross-collection alternative-installs strategy lands.

# Enable the devkitPro toolchain block (master toggle — gates all
# per-platform toggles below; installs devkitpro-keyring + devkit-env)
development_devkitpro_enabled: false

# devkitPro pacman repositories, provided ready-made so you do not have
# to hand-type the signing key and server URLs. Registration itself
# happens in marcstraube.common.package_management — wire it up once in
# inventory group_vars:
#   pacman_custom_repositories: "{{ development_devkitpro_repositories }}"
development_devkitpro_repositories:
  - name: 'dkp-libs'
    server: 'https://pkg.devkitpro.org/packages'
    key_id: 'BC26F752D25B92CE272E0F44F7FD5492264BB9D0'
    keyserver: 'keyserver.ubuntu.com'
  - name: 'dkp-linux'
    server: 'https://pkg.devkitpro.org/packages/linux/$arch'

# Per-platform toolchain groups (each pulls its devkit* compiler plus
# libraries and tools). All require development_devkitpro_enabled.
# Install-only: the groups share common members, so disabling a toggle
# after install does not uninstall the toolchain.
development_devkitpro_gba_dev_enabled: false        # Game Boy Advance (devkitARM)
development_devkitpro_nds_dev_enabled: false        # Nintendo DS (devkitARM)
development_devkitpro_3ds_dev_enabled: false        # Nintendo 3DS (devkitARM)
development_devkitpro_gamecube_dev_enabled: false   # GameCube (devkitPPC)
development_devkitpro_wii_dev_enabled: false        # Wii (devkitPPC)
development_devkitpro_switch_dev_enabled: false     # Switch (devkitA64)

#
# Language Tooling
#
# Linters, formatters, and test frameworks for shell, Python, Lua, and
# QML. Each toggle resolves to a `__development_<tool>_package` variable
# in vars/{distro}.yml — empty on distros without an upstream package,
# in which case the install task is a no-op.

# Shell

# Enable shfmt shell formatter (POSIX sh, bash, mksh)
development_shell_shfmt_enabled: false

# Enable shellcheck shell linter (sh, bash, dash, ksh)
development_shell_shellcheck_enabled: true

# Enable bats-core Bash test framework (bash-only)
development_shell_bats_enabled: false

# Python Tooling

# Enable ruff Python linter and formatter
development_python_ruff_enabled: false

# Enable uv Python package installer and resolver
development_python_uv_enabled: false

# Lua

# Enable stylua Lua formatter
development_lua_stylua_enabled: false

# Enable luacheck Lua linter
development_lua_luacheck_enabled: false

# Enable busted Lua test framework
development_lua_busted_enabled: false

# QML

# Enable Qt6 QML tools (qmllint + qmlformat — single package)
development_qml_tools_enabled: false

#
# Build Tools
#

# Enable make and core build tools
development_make_enabled: true

# Enable cmake
development_cmake_enabled: true

# Enable meson
development_meson_enabled: true

# Enable ninja
development_ninja_enabled: true

#
# IDEs and Editors
#

# Enable VS Code
development_vscode_enabled: false

# Enable VSCodium
development_vscodium_enabled: true

# Enable JetBrains Toolbox (manages all JetBrains IDEs)
development_jetbrains_toolbox_enabled: false

# Enable PHPStorm
development_phpstorm_enabled: false

# Enable Zed Editor
development_zed_enabled: false

# Enable Arduino IDE 2.x (Theia/Electron based)
development_arduino_ide_enabled: false

# Enable classic Arduino IDE 1.x (Java/Swing based)
development_arduino_classic_enabled: false

#
# Database Tools
#

# Enable DBeaver
development_dbeaver_enabled: false

# Enable pgAdmin
development_pgadmin_enabled: false

#
# API Tools
#

# Enable httpie CLI HTTP client
development_httpie_enabled: true

# Enable Postman
development_postman_enabled: false

# Enable Insomnia
development_insomnia_enabled: false

# Enable Bruno (open-source Postman alternative)
development_bruno_enabled: false

#
# Misc Tools
#

# Enable jq JSON processor
development_jq_enabled: true

# Enable yq YAML processor
development_yq_enabled: true

# Enable direnv directory-based env vars
development_direnv_enabled: true

# Enable pre-commit git hooks
development_pre_commit_enabled: true

#
# Security Tooling
#
# Supply-chain / dependency scanners. PM-native tools are installed
# from their canonical source: AUR on Arch (which wraps the upstream
# package manager), and the upstream package manager directly on
# Debian/RedHat.

# Enable Socket CLI (npm dependency supply-chain scanner)
development_socket_cli_enabled: false

#
# User Configuration
#

# Users to configure with development settings (git + IDEs).
# Per-user mode (managed/initial/disabled) can be set per entry; the
# top-level default below applies when an entry omits it.
development_users: []
# Example:
#   - username: 'johndoe'
#     mode: 'managed'                        # optional, overrides global
#     git_name: 'John Doe'
#     git_email: 'john@example.com'
#     git_signing_key: '0x1234567890ABCDEF'

# Default mode when a user entry does not set its own `mode`:
#   managed  — overwrite the file on every run
#   initial  — deploy only when the user was created in this run
#   disabled — skip user-config deploy entirely
development_user_config_mode: 'initial'

#
# VSCode / VSCodium settings (per-user)
#
# Deployed under <user-home>/.config/Code/User/settings.json (VSCode)
# and/or <user-home>/.config/VSCodium/User/settings.json. Both editors
# read the same key syntax. Defaults below opt out of telemetry from
# the editor core and from common Microsoft/Red Hat extensions; user
# inventory can override or extend.

development_vscode_settings:
  telemetry.telemetryLevel: 'off'                          # editor core
  workbench.enableExperiments: false                       # A/B experiments
  workbench.settings.enableNaturalLanguageSearch: false    # cloud search lookup
  update.mode: 'none'                                      # OS package manager handles updates
  extensions.autoCheckUpdates: false
  redhat.telemetry.enabled: false                          # all Red Hat-published extensions
  workbench.welcomePage.walkthroughs.openOnInstall: false  # UX, but unwanted phone-home

# argv.json deployed under <user-home>/.vscode/argv.json (VSCode) and
# <user-home>/.vscode-oss/argv.json (VSCodium). Electron-runtime level;
# distinct from the editor settings above.
development_vscode_argv:
  enable-crash-reporter: false
  enable-telemetry: false
