---
#
# Arch Linux Variables
#

# Version control
__development_git_packages:
  - 'git'
  - 'git-delta'

__development_git_lfs_package: 'git-lfs'
__development_github_cli_package: 'github-cli'
__development_gitlab_cli_package: 'glab'

# Python
__development_python_packages:
  - 'python'
  - 'python-pip'
  - 'python-pipx'

# Rust
__development_rust_packages:
  - 'rust'

# Go
__development_go_packages:
  - 'go'

# Java
__development_java_package: 'jdk-openjdk'

# C/C++ (clang bundles clang-format, clang-tidy and clangd)
__development_c_packages:
  - 'clang'
  - 'gdb'
  - 'pkgconf'

__development_c_ccache_package: 'ccache'
__development_c_valgrind_package: 'valgrind'
__development_c_cppcheck_package: 'cppcheck'
__development_c_bear_package: 'bear'

# Build tools
__development_build_packages:
  - 'base-devel'
  - 'make'

__development_cmake_package: 'cmake'
__development_meson_package: 'meson'
__development_ninja_package: 'ninja'

# Database tools
__development_dbeaver_package: 'dbeaver'
__development_pgadmin_package: 'pgadmin4'

# API tools
__development_httpie_package: 'httpie'

# Misc tools
__development_jq_package: 'jq'
__development_yq_package: 'yq'
__development_direnv_package: 'direnv'
__development_pre_commit_package: 'pre-commit'

# Shell tooling
__development_shell_shfmt_package: 'shfmt'
__development_shell_shellcheck_package: 'shellcheck'
__development_shell_bats_package: 'bats'

# Python tooling
__development_python_ruff_package: 'ruff'
__development_python_uv_package: 'uv'

# Lua tooling
__development_lua_stylua_package: 'stylua'
__development_lua_luacheck_package: 'luacheck'
__development_lua_busted_package: 'busted'

# QML tooling (qmllint + qmlformat ship in the same package)
__development_qml_tools_package: 'qt6-declarative'

# Serial device access for Arduino (uucp required for CH340 USB-serial
# chips — uaccess from systemd-logind alone is not sufficient)
__development_serial_groups:
  - 'uucp'

# AUR packages
__development_aur_packages:
  ides_vscodium:
    - 'vscodium-bin'
  ides_vscode:
    - 'visual-studio-code-bin'
  ides_jetbrains:
    - 'jetbrains-toolbox'
  ides_phpstorm:
    - 'phpstorm'
    - 'phpstorm-jre'
  ides_zed:
    - 'zed-editor'
  ides_arduino_ide:
    - 'arduino-ide-bin'
  ides_arduino_classic:
    - 'arduino'
  api_tools_postman:
    - 'postman-bin'
  api_tools_insomnia:
    - 'insomnia-bin'
  api_tools_bruno:
    - 'bruno-bin'
  security_socket_cli:
    - 'socket-cli'
  c_codelldb:
    - 'codelldb-bin'
  gb_gbdk:
    - 'gbdk-2020'
  gb_gbstudio:
    - 'gb-studio-bin'

# devkitPro (Nintendo homebrew toolchains via the dkp-libs / dkp-linux
# repos — registered through package_management, see defaults/main.yml).
# The keyring and toolchains are served from the repos themselves.
__development_devkitpro_keyring_package: 'devkitpro-keyring'

# devkit-env ships /etc/profile.d/devkit-env.sh, exporting DEVKITPRO,
# DEVKITARM, DEVKITPPC, DEVKITA64 and PATH system-wide
__development_devkitpro_env_package: 'devkit-env'

# Per-platform package groups, paired with their master-gated toggle
__development_devkitpro_groups:
  - group: 'gba-dev'
    enabled: '{{ development_devkitpro_gba_dev_enabled | bool }}'
  - group: 'nds-dev'
    enabled: '{{ development_devkitpro_nds_dev_enabled | bool }}'
  - group: '3ds-dev'
    enabled: '{{ development_devkitpro_3ds_dev_enabled | bool }}'
  - group: 'gamecube-dev'
    enabled: '{{ development_devkitpro_gamecube_dev_enabled | bool }}'
  - group: 'wii-dev'
    enabled: '{{ development_devkitpro_wii_dev_enabled | bool }}'
  - group: 'switch-dev'
    enabled: '{{ development_devkitpro_switch_dev_enabled | bool }}'
