---
#
# IDEs Installation
#

# VSCodium (Arch AUR)

- name: IDEs | Manage VSCodium from AUR (Arch)
  become: true
  become_user: 'aur_builder'
  kewlfft.aur.aur:
    name: '{{ __development_aur_packages.ides_vscodium }}'
    state: "{{ 'present' if development_vscodium_enabled | bool else 'absent' }}"
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __development_aur_packages.ides_vscodium | default([]) | length > 0

- name: IDEs | VSCodium not available notice (non-Arch)
  ansible.builtin.debug:
    msg: 'VSCodium requires Flatpak or external repository on {{ ansible_facts["os_family"] }}.'
  when:
    - ansible_facts['os_family'] != 'Archlinux'
    - development_vscodium_enabled | bool

