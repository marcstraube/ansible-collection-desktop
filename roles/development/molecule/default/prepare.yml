---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  vars:
    __prepare_packages:
      Archlinux:
        - systemd
        - base-devel
        - sudo
      Debian:
        - systemd
        - dbus
        - locales
      RedHat:
        - systemd
        - dbus-broker
        - glibc-langpack-en
        - glibc-locale-source
        - curl

  tasks:
    #
    # Package Cache
    #

    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Container Dependencies
    #

    - name: Prepare | Install container dependencies
      ansible.builtin.package:
        name: '{{ __prepare_packages[ansible_facts["os_family"]] }}'
        state: present

    - name: Prepare | Replace curl-minimal with curl (RedHat)
      ansible.builtin.dnf:
        name:
          - curl
        state: present
        allowerasing: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Start D-Bus (RedHat)
      ansible.builtin.service:
        name: dbus-broker
        state: started
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # AUR Builder (Arch)
    #

    - name: Prepare | Create aur_builder user (Arch)
      ansible.builtin.user:
        name: aur_builder
        group: wheel
        create_home: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Configure sudoers for aur_builder (Arch)
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/aur_builder
        line: 'aur_builder ALL=(ALL) NOPASSWD: ALL'
        create: true
        mode: '0440'
        validate: 'visudo -cf %s'
      when: ansible_facts['os_family'] == 'Archlinux'
