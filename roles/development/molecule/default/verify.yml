---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    - name: Verify | Load OS-specific variables
      ansible.builtin.include_vars: '{{ item }}'
      with_first_found:
        - files:
            - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["distribution"] }}.yml'
            - '{{ ansible_facts["os_family"] }}.yml'
          paths:
            - '../../vars'

    #
    # Git
    #

    - name: Verify | Check git installed (Arch)
      ansible.builtin.command:
        cmd: 'pacman -Q git'
      register: _dev_git_arch
      changed_when: false
      failed_when: _dev_git_arch.rc != 0
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Verify | Check git installed (Debian)
      ansible.builtin.command:
        cmd: 'dpkg -l git'
      register: _dev_git_deb
      changed_when: false
      failed_when: _dev_git_deb.rc != 0
      when: ansible_facts['os_family'] == 'Debian'

    - name: >-
        Verify | Check git installed
        (RedHat)
      ansible.builtin.command:  # noqa: command-instead-of-module
        cmd: 'rpm -q git'
      register: _dev_git_rpm
      changed_when: false
      failed_when: _dev_git_rpm.rc != 0
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Python
    #

    - name: Verify | Check python installed (Arch)
      ansible.builtin.command:
        cmd: 'pacman -Q python'
      register: _dev_python_arch
      changed_when: false
      failed_when: _dev_python_arch.rc != 0
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Verify | Check python3 installed (Debian)
      ansible.builtin.command:
        cmd: 'dpkg -l python3'
      register: _dev_python_deb
      changed_when: false
      failed_when: _dev_python_deb.rc != 0
      when: ansible_facts['os_family'] == 'Debian'

    - name: >-
        Verify | Check python3 installed
        (RedHat)
      ansible.builtin.command:  # noqa: command-instead-of-module
        cmd: 'rpm -q python3'
      register: _dev_python_rpm
      changed_when: false
      failed_when: _dev_python_rpm.rc != 0
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Build Tools
    #

    - name: Verify | Check make installed (Arch)
      ansible.builtin.command:
        cmd: 'pacman -Q make'
      register: _dev_make_arch
      changed_when: false
      failed_when: _dev_make_arch.rc != 0
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Verify | Check make installed (Debian)
      ansible.builtin.command:
        cmd: 'dpkg -l make'
      register: _dev_make_deb
      changed_when: false
      failed_when: _dev_make_deb.rc != 0
      when: ansible_facts['os_family'] == 'Debian'

    - name: >-
        Verify | Check make installed
        (RedHat)
      ansible.builtin.command:  # noqa: command-instead-of-module
        cmd: 'rpm -q make'
      register: _dev_make_rpm
      changed_when: false
      failed_when: _dev_make_rpm.rc != 0
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # httpie (disabled in molecule converge — verify off-path)
    #

    - name: Verify | httpie disabled — package not installed
      ansible.builtin.package:
        name: '{{ __development_httpie_package }}'
        state: absent
      check_mode: true
      register: _dev_httpie_check
      failed_when: _dev_httpie_check.changed
      when: __development_httpie_package | default('') | length > 0

    #
    # Misc Tools
    #

    - name: Verify | Check jq installed (Arch)
      ansible.builtin.command:
        cmd: 'pacman -Q jq'
      register: _dev_jq_arch
      changed_when: false
      failed_when: _dev_jq_arch.rc != 0
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Verify | Check jq installed (Debian)
      ansible.builtin.command:
        cmd: 'dpkg -l jq'
      register: _dev_jq_deb
      changed_when: false
      failed_when: _dev_jq_deb.rc != 0
      when: ansible_facts['os_family'] == 'Debian'

    - name: >-
        Verify | Check jq installed
        (RedHat)
      ansible.builtin.command:  # noqa: command-instead-of-module
        cmd: 'rpm -q jq'
      register: _dev_jq_rpm
      changed_when: false
      failed_when: _dev_jq_rpm.rc != 0
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Language Tooling (per-platform availability — skipped when package is '')
    #

    - name: Verify | shfmt — package installed
      ansible.builtin.package:
        name: '{{ __development_shell_shfmt_package }}'
        state: present
      check_mode: true
      register: _dev_shfmt_check
      failed_when: _dev_shfmt_check.changed
      when: __development_shell_shfmt_package | default('') | length > 0

    - name: Verify | shellcheck — package installed
      ansible.builtin.package:
        name: '{{ __development_shell_shellcheck_package }}'
        state: present
      check_mode: true
      register: _dev_shellcheck_check
      failed_when: _dev_shellcheck_check.changed
      when: __development_shell_shellcheck_package | default('') | length > 0

    - name: Verify | bats — package installed
      ansible.builtin.package:
        name: '{{ __development_shell_bats_package }}'
        state: present
      check_mode: true
      register: _dev_bats_check
      failed_when: _dev_bats_check.changed
      when: __development_shell_bats_package | default('') | length > 0

    - name: Verify | ruff — package installed
      ansible.builtin.package:
        name: '{{ __development_python_ruff_package }}'
        state: present
      check_mode: true
      register: _dev_ruff_check
      failed_when: _dev_ruff_check.changed
      when: __development_python_ruff_package | default('') | length > 0

    - name: Verify | stylua — package installed
      ansible.builtin.package:
        name: '{{ __development_lua_stylua_package }}'
        state: present
      check_mode: true
      register: _dev_stylua_check
      failed_when: _dev_stylua_check.changed
      when: __development_lua_stylua_package | default('') | length > 0

    - name: Verify | luacheck — package installed
      ansible.builtin.package:
        name: '{{ __development_lua_luacheck_package }}'
        state: present
      check_mode: true
      register: _dev_luacheck_check
      failed_when: _dev_luacheck_check.changed
      when: __development_lua_luacheck_package | default('') | length > 0

    - name: Verify | busted — package installed
      ansible.builtin.package:
        name: '{{ __development_lua_busted_package }}'
        state: present
      check_mode: true
      register: _dev_busted_check
      failed_when: _dev_busted_check.changed
      when: __development_lua_busted_package | default('') | length > 0

    - name: Verify | qml-tools — package installed
      ansible.builtin.package:
        name: '{{ __development_qml_tools_package }}'
        state: present
      check_mode: true
      register: _dev_qml_tools_check
      failed_when: _dev_qml_tools_check.changed
      when: __development_qml_tools_package | default('') | length > 0

    #
    # Toggle verification: cmake enabled, meson disabled
    #

    - name: Verify | cmake enabled — package installed
      ansible.builtin.package:
        name: '{{ __development_cmake_package }}'
        state: present
      check_mode: true
      register: _dev_cmake_check
      failed_when: _dev_cmake_check.changed
      when: __development_cmake_package | default('') | length > 0

    - name: Verify | meson disabled — package not installed
      ansible.builtin.package:
        name: '{{ __development_meson_package }}'
        state: absent
      check_mode: true
      register: _dev_meson_check
      failed_when: _dev_meson_check.changed
      when: __development_meson_package | default('') | length > 0

    #
    # git-lfs (enabled)
    #

    - name: Verify | git-lfs enabled — package installed
      ansible.builtin.package:
        name: '{{ __development_git_lfs_package }}'
        state: present
      check_mode: true
      register: _dev_git_lfs_check
      failed_when: _dev_git_lfs_check.changed
      when: __development_git_lfs_package | default('') | length > 0

    #
    # Socket CLI (enabled) — AUR on Arch, npm-global on non-Arch
    #

    - name: Verify | Socket CLI installed from AUR (Arch)
      ansible.builtin.command:
        cmd: 'pacman -Q socket-cli'
      register: _dev_socket_cli_arch
      changed_when: false
      failed_when: _dev_socket_cli_arch.rc != 0
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Verify | Socket CLI installed via npm (non-Arch)
      ansible.builtin.command:
        cmd: 'npm ls -g --depth=0 socket'
      register: _dev_socket_cli_npm
      changed_when: false
      failed_when: _dev_socket_cli_npm.rc != 0
      when: ansible_facts['os_family'] != 'Archlinux'
