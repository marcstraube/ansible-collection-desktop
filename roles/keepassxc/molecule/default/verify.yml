---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    #
    # Package Verification
    #

    - name: Verify | Check keepassxc installed (Arch)
      ansible.builtin.command:
        cmd: 'pacman -Q keepassxc'
      register: _keepassxc_arch
      changed_when: false
      failed_when: _keepassxc_arch.rc != 0
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Verify | Check keepassxc installed (Debian)
      ansible.builtin.command:
        cmd: 'dpkg -l keepassxc'
      register: _keepassxc_deb
      changed_when: false
      failed_when: _keepassxc_deb.rc != 0
      when: ansible_facts['os_family'] == 'Debian'

    - name: Verify | Check keepassxc installed (RedHat)
      ansible.builtin.command:  # noqa: command-instead-of-module
        cmd: 'rpm -q keepassxc'
      register: _keepassxc_rpm
      changed_when: false
      failed_when: _keepassxc_rpm.rc != 0
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Secret Service Verification
    #

    - name: Verify | Check global Secret Service file
      ansible.builtin.stat:
        path: /usr/local/share/dbus-1/services/org.freedesktop.secrets.service
      register: _keepassxc_secret_service

    - name: Verify | Assert global Secret Service file exists
      ansible.builtin.assert:
        that:
          - _keepassxc_secret_service.stat.exists
          - _keepassxc_secret_service.stat.isreg
          - _keepassxc_secret_service.stat.mode == '0644'
        fail_msg: >-
          Global Secret Service file missing or wrong permissions

    - name: Verify | Read Secret Service file content
      ansible.builtin.slurp:
        src: /usr/local/share/dbus-1/services/org.freedesktop.secrets.service
      register: _keepassxc_secret_content

    - name: Verify | Assert Secret Service configuration
      ansible.builtin.assert:
        that:
          - >-
            'org.freedesktop.secrets'
            in (_keepassxc_secret_content.content | b64decode)
          - >-
            '/usr/bin/keepassxc'
            in (_keepassxc_secret_content.content | b64decode)
        fail_msg: 'Secret Service configuration incorrect'

    #
    # Per-user Config Verification (testuser, mode: managed)
    #

    - name: Verify | Check testuser keepassxc.ini exists
      ansible.builtin.stat:
        path: '/home/testuser/.config/keepassxc/keepassxc.ini'
      register: _keepassxc_user_ini

    - name: Verify | Assert testuser keepassxc.ini deployed
      ansible.builtin.assert:
        that:
          - _keepassxc_user_ini.stat.exists
          - _keepassxc_user_ini.stat.pw_name == 'testuser'
          - _keepassxc_user_ini.stat.mode == '0600'
        fail_msg: 'testuser keepassxc.ini missing or wrong ownership/permissions'

    - name: Verify | Read testuser keepassxc.ini
      ansible.builtin.slurp:
        src: '/home/testuser/.config/keepassxc/keepassxc.ini'
      register: _keepassxc_user_ini_content

    - name: Verify | Assert managed-mode template values present
      ansible.builtin.assert:
        that:
          - "'[FdoSecrets]' in __ini_text"
          - "'[Security]' in __ini_text"
          - "'ConfigVersion=2' in __ini_text"
          - "'BackupBeforeSave=true' in __ini_text"
          - "'UseAtomicSaves=true' in __ini_text"
          - "'MinimizeOnClose=false' in __ini_text"
          - "'MinimizeOnStartup=true' in __ini_text"
          - "'TrayIconAppearance=monochrome-light' in __ini_text"
        fail_msg: 'testuser keepassxc.ini missing expected sections/values'
      vars:
        __ini_text: '{{ _keepassxc_user_ini_content.content | b64decode }}'

    #
    # XDG Autostart Verification (autostart_enabled: true)
    #

    - name: Verify | Check testuser XDG autostart entry
      ansible.builtin.stat:
        path: '/home/testuser/.config/autostart/org.keepassxc.KeePassXC.desktop'
      register: _keepassxc_user_autostart

    - name: Verify | Assert XDG autostart entry deployed
      ansible.builtin.assert:
        that:
          - _keepassxc_user_autostart.stat.exists
          - _keepassxc_user_autostart.stat.isreg
          - _keepassxc_user_autostart.stat.pw_name == 'testuser'
          - _keepassxc_user_autostart.stat.mode == '0600'
        fail_msg: 'testuser XDG autostart entry missing or wrong ownership/permissions'

    - name: Verify | Read XDG autostart entry content
      ansible.builtin.slurp:
        src: '/home/testuser/.config/autostart/org.keepassxc.KeePassXC.desktop'
      register: _keepassxc_autostart_content

    - name: Verify | Assert XDG autostart entry has required hints
      ansible.builtin.assert:
        that:
          - "'[Desktop Entry]' in __autostart_text"
          - "'Exec=keepassxc' in __autostart_text"
          - "'X-GNOME-Autostart-enabled=true' in __autostart_text"
          - "'X-GNOME-Autostart-Delay=2' in __autostart_text"
          - "'X-KDE-autostart-after=panel' in __autostart_text"
          - "'X-LXQt-Need-Tray=true' in __autostart_text"
        fail_msg: 'XDG autostart entry missing required Desktop Entry keys or tray-readiness hints'
      vars:
        __autostart_text: '{{ _keepassxc_autostart_content.content | b64decode }}'

    #
    # Managed Mode — Per-User Disabled Override (kp_disabled_user)
    #
    # Entry-level mode=disabled overrides the managed global mode
    # → role MUST NOT deploy keepassxc.ini for this user.
    #

    - name: Verify | Check per-user-disabled user has no keepassxc.ini
      ansible.builtin.stat:
        path: '/home/kp_disabled_user/.config/keepassxc/keepassxc.ini'
      register: _keepassxc_disabled_ini

    - name: Verify | Assert per-user-disabled user has no config
      ansible.builtin.assert:
        that:
          - not _keepassxc_disabled_ini.stat.exists
        fail_msg: 'keepassxc.ini deployed for a per-user-disabled entry'

    #
    # Initial Mode — No Existing Config (kp_initial_fresh)
    #
    # keepassxc_user_config_mode=initial + keepassxc.ini absent
    # → role MUST deploy the config.
    #

    - name: Verify | Check initial-fresh user keepassxc.ini exists
      ansible.builtin.stat:
        path: '/home/kp_initial_fresh/.config/keepassxc/keepassxc.ini'
      register: _keepassxc_initialfresh_ini

    - name: Verify | Assert initial-fresh user config is deployed
      ansible.builtin.assert:
        that:
          - _keepassxc_initialfresh_ini.stat.exists
          - _keepassxc_initialfresh_ini.stat.pw_name == 'kp_initial_fresh'
          - _keepassxc_initialfresh_ini.stat.mode == '0600'
        fail_msg: 'keepassxc.ini not deployed for initial-mode user without existing config'

    - name: Verify | Read initial-fresh user keepassxc.ini
      ansible.builtin.slurp:
        src: '/home/kp_initial_fresh/.config/keepassxc/keepassxc.ini'
      register: _keepassxc_initialfresh_content

    - name: Verify | Assert initial-fresh user config has template values
      ansible.builtin.assert:
        that:
          - "'ConfigVersion=2' in (_keepassxc_initialfresh_content.content | b64decode)"
          - "'[Security]' in (_keepassxc_initialfresh_content.content | b64decode)"
        fail_msg: 'initial-fresh keepassxc.ini missing expected template values'

    #
    # Initial Mode — Existing Config (kp_initial_exist)
    #
    # keepassxc_user_config_mode=initial + keepassxc.ini already present
    # → role MUST leave the existing config untouched (no overwrite).
    #

    - name: Verify | Read initial-exist user keepassxc.ini
      ansible.builtin.slurp:
        src: '/home/kp_initial_exist/.config/keepassxc/keepassxc.ini'
      register: _keepassxc_initialexist_content

    - name: Verify | Assert initial-exist user config is unchanged
      ansible.builtin.assert:
        that:
          - "'ConfigVersion=99' in (_keepassxc_initialexist_content.content | b64decode)"
          - "'[MoleculeFixture]' in (_keepassxc_initialexist_content.content | b64decode)"
          - "'preexisting=true' in (_keepassxc_initialexist_content.content | b64decode)"
        fail_msg: 'pre-existing keepassxc.ini was overwritten for existing initial-mode user'

    #
    # Disabled Mode — Global (kp_global_disabled)
    #
    # keepassxc_user_config_mode=disabled
    # → role MUST NOT deploy keepassxc.ini for any user.
    #

    - name: Verify | Check global-disabled user has no keepassxc.ini
      ansible.builtin.stat:
        path: '/home/kp_global_disabled/.config/keepassxc/keepassxc.ini'
      register: _keepassxc_globaldisabled_ini

    - name: Verify | Assert global-disabled user has no config
      ansible.builtin.assert:
        that:
          - not _keepassxc_globaldisabled_ini.stat.exists
        fail_msg: 'keepassxc.ini deployed despite global disabled mode'
