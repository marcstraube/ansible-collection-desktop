---
#
# KeePassXC Autostart Tasks
#
# Manages the XDG autostart entry that KeePassXC's own GUI checkbox
# ("Automatically launch KeePassXC at system startup") writes to
# ~/.config/autostart/. Existence of the file is the autostart state;
# KeePassXC checks file presence in Linux::isLaunchAtStartupEnabled().

- name: Autostart | Read system KeePassXC desktop file for GenericName translations
  ansible.builtin.slurp:
    src: /usr/share/applications/org.keepassxc.KeePassXC.desktop
  register: __keepassxc_system_desktop
  when: keepassxc_users | length > 0

- name: Autostart | Create autostart directory
  ansible.builtin.file:
    path: '/home/{{ item.name }}/.config/autostart'
    state: directory
    owner: '{{ item.name }}'
    group: '{{ item.group | default(item.name) }}'
    mode: '0700'
  loop: '{{ keepassxc_users }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.autostart | default(true) | bool

- name: Autostart | Deploy XDG autostart entry
  ansible.builtin.template:
    src: 'org.keepassxc.KeePassXC.desktop.j2'
    dest: '/home/{{ item.name }}/.config/autostart/org.keepassxc.KeePassXC.desktop'
    owner: '{{ item.name }}'
    group: '{{ item.group | default(item.name) }}'
    mode: '0600'
  loop: '{{ keepassxc_users }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.autostart | default(true) | bool

- name: Autostart | Remove XDG autostart entry when disabled
  ansible.builtin.file:
    path: '/home/{{ item.name }}/.config/autostart/org.keepassxc.KeePassXC.desktop'
    state: absent
  loop: '{{ keepassxc_users }}'
  loop_control:
    label: '{{ item.name }}'
  when: not (item.autostart | default(true) | bool)
