---
#
# Desktop Environment Handlers
#

# Container-safety for molecule
- name: Reload systemd user daemon
  ansible.builtin.systemd_service:
    daemon_reload: true
    scope: user
  become: true
  become_user: '{{ item }}'
  loop: '{{ desktop_environment_users }}'
  loop_control:
    label: '{{ item }}'
  failed_when: false
  when:
    - desktop_environment_enabled | bool
    - desktop_environment_users | length > 0
