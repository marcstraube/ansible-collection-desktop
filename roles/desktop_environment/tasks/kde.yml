---
#
# KDE Plasma Installation
#

- name: KDE | Build package list
  ansible.builtin.set_fact:
    __desktop_environment_kde_install_packages: >-
      {{
        (desktop_environment_kde_full_enabled | bool
          | ternary(__desktop_environment_kde_full_packages,
                    __desktop_environment_kde_minimal_packages)) +
        (desktop_environment_kde_apps
          | map('extract', __desktop_environment_kde_app_packages)
          | select('string') | list)
      }}

- name: KDE | Filter empty packages
  ansible.builtin.set_fact:
    __desktop_environment_kde_install_packages: >-
      {{ __desktop_environment_kde_install_packages | select('string') | reject('equalto', '') | list }}

- name: KDE | Install packages
  ansible.builtin.package:
    name: '{{ __desktop_environment_kde_install_packages }}'
    state: present
  when:
    - __desktop_environment_kde_install_packages | length > 0
