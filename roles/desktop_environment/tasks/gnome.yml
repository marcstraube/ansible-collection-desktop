---
#
# GNOME Installation
#

- name: GNOME | Build package list
  ansible.builtin.set_fact:
    __desktop_environment_gnome_install_packages: >-
      {{
        (desktop_environment_gnome_full_enabled | bool
          | ternary(__desktop_environment_gnome_full_packages,
                    __desktop_environment_gnome_minimal_packages)) +
        ((desktop_environment_gnome_extras_enabled | bool
          and __desktop_environment_gnome_extras_package | length > 0)
          | ternary([__desktop_environment_gnome_extras_package], [])) +
        (desktop_environment_gnome_tweaks_enabled | bool
          | ternary([__desktop_environment_gnome_tweaks_package], []))
      }}

- name: GNOME | Filter empty packages
  ansible.builtin.set_fact:
    __desktop_environment_gnome_install_packages: >-
      {{ __desktop_environment_gnome_install_packages | select('string') | reject('equalto', '') | list }}

- name: GNOME | Install packages
  ansible.builtin.package:
    name: '{{ __desktop_environment_gnome_install_packages }}'
    state: present
  when:
    - __desktop_environment_gnome_install_packages | length > 0
