---
#
# Role Control
#

# Enable the communication role
communication_enabled: true

#
# Messaging
#

# Enable Slack team communication
communication_slack_enabled: true

# Enable Slack Wayland variant
communication_slack_wayland_enabled: false

# Enable Telegram instant messaging
communication_telegram_enabled: true

# Enable Threema secure messaging
communication_threema_enabled: true

# Enable Signal Desktop
communication_signal_enabled: false

# Enable Discord
communication_discord_enabled: false

# Enable Element Matrix client
communication_element_enabled: false

#
# Email Filters
#

# Enable Sieve email filtering (ManageSieve client)
communication_sieve_enabled: true

#
# VoIP
#

# Enable Zoom
communication_zoom_enabled: false

# Enable Microsoft Teams
communication_teams_enabled: false

# Enable Jitsi Meet
communication_jitsi_enabled: false

#
# Connectivity
#

# Enable KDE Connect phone/desktop integration
communication_kdeconnect_enabled: false
