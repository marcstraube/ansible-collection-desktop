---
#
# Repository Packages
#

- name: Install | Telegram
  ansible.builtin.package:
    name: '{{ __communication_telegram_package }}'
    state: present
  when:
    - communication_telegram_enabled | bool
    - __communication_telegram_package | default('') | length > 0
  retries: 3
  delay: 5

- name: Install | Signal
  ansible.builtin.package:
    name: '{{ __communication_signal_package }}'
    state: present
  when:
    - communication_signal_enabled | bool
    - __communication_signal_package | default('') | length > 0
  retries: 3
  delay: 5

