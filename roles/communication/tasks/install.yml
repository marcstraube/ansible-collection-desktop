#
# AUR Packages (Arch)
#

- name: Install | Slack from AUR (Arch)
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: '{{ __communication_aur_packages.slack }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - communication_slack_enabled | bool
    - not (communication_slack_wayland_enabled | bool)
  retries: 3
  delay: 5

- name: Install | Slack Wayland from AUR (Arch)
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: '{{ __communication_aur_packages.slack_wayland }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - communication_slack_enabled | bool
    - communication_slack_wayland_enabled | bool
  retries: 3
  delay: 5

