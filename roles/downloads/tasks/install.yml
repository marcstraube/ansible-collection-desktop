---
#
# Torrent Clients
#

- name: Install | Transmission
  ansible.builtin.package:
    name: '{{ __downloads_transmission_package }}'
    state: present
  when:
    - downloads_transmission_enabled | bool
    - __downloads_transmission_package | default('') | length > 0
  retries: 3
  delay: 5

- name: Install | qBittorrent
  ansible.builtin.package:
    name: '{{ __downloads_qbittorrent_package }}'
    state: present
  when:
    - downloads_qbittorrent_enabled | bool
    - __downloads_qbittorrent_package | default('') | length > 0
  retries: 3
  delay: 5

- name: Install | Deluge
  ansible.builtin.package:
    name: '{{ __downloads_deluge_package }}'
    state: present
  when:
    - downloads_deluge_enabled | bool
    - __downloads_deluge_package | default('') | length > 0
  retries: 3
  delay: 5

#
# Video Downloaders
#

- name: Install | yt-dlp
  ansible.builtin.package:
    name: '{{ __downloads_ytdlp_package }}'
    state: present
