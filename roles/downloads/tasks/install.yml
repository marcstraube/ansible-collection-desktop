#
# Download Managers
#

- name: Install | aria2
  ansible.builtin.package:
    name: '{{ __downloads_aria2_package }}'
    state: present
  when:
    - downloads_aria2_enabled | bool
    - __downloads_aria2_package | default('') | length > 0
