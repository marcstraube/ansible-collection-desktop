#
# AUR Packages
#

- name: Install | JDownloader from AUR (Arch)
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: '{{ __downloads_aur_packages.jdownloader }}'
    state: present
  when:
    - downloads_jdownloader_enabled | bool
    - ansible_facts['os_family'] == 'Archlinux'
  retries: 3
  delay: 5
