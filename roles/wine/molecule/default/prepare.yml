---
- name: Prepare
  hosts: all
  gather_facts: true

  tasks:
    # Sudo PAM bypass — required for tasks using `become_user` on
    # geerlingguy Rocky containers under GitHub-hosted runners
    # (test container only).

    - name: Prepare | Bypass sudo PAM stack (RedHat container)
      ansible.builtin.copy:
        content: |
          #%PAM-1.0
          auth       sufficient   pam_permit.so
          account    sufficient   pam_permit.so
          password   sufficient   pam_permit.so
          session    sufficient   pam_permit.so
        dest: /etc/pam.d/sudo
        owner: root
        group: root
        mode: '0644'
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Disable sudoers authentication (RedHat container)
      ansible.builtin.copy:
        content: 'Defaults !authenticate'
        dest: /etc/sudoers.d/molecule-no-auth
        owner: root
        group: root
        mode: '0440'
        validate: 'visudo -cf %s'
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Repository Setup
    #

    - name: Prepare | Install EPEL repository (RedHat)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Enable CRB repository (RedHat)
      ansible.builtin.command:
        cmd: dnf config-manager --set-enabled crb
      changed_when: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Enable contrib component (Debian)
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/debian.sources
        regexp: '^(Components: main)$'
        replace: '\1 contrib'
      when: ansible_facts['os_family'] == 'Debian'

    #
    # Package Cache Updates
    #

    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Test users for user_config_mode coverage
    #

    - name: Prepare | Create test users
      ansible.builtin.user:
        name: '{{ item }}'
        create_home: true
        shell: /bin/bash
        # Real sha512 password hash. Required so PAM account management
        # accepts root → user become in containerised Rocky under
        # GitHub-hosted runners (locked accounts and `*` placeholder both
        # fail pam_unix account check with "Authentication service cannot
        # retrieve authentication info").
        password: "{{ 'molecule-wine-test-noop' | password_hash('sha512') }}"
        update_password: 'on_create'
      loop:
        # Play 1 (managed): reconciled user + per-user disabled override
        - wine_managed_user
        - wine_disabled_user
        # Play 2 (initial): no existing prefix (initialized) + existing prefix (untouched)
        - wine_initial_fresh
        - wine_initial_exist
        # Play 3 (disabled, global): never initialized
        - wine_global_disabled
      loop_control:
        label: '{{ item }}'
