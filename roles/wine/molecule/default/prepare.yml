---
- name: Prepare
  hosts: all
  gather_facts: true

  tasks:
    # Sudo PAM bypass — required for tasks using `become_user` on
    # geerlingguy Rocky containers under GitHub-hosted runners
    # (test container only).

    - name: Prepare | Bypass sudo PAM stack (RedHat container)
      ansible.builtin.copy:
        content: |
          #%PAM-1.0
          auth       sufficient   pam_permit.so
          account    sufficient   pam_permit.so
          password   sufficient   pam_permit.so
          session    sufficient   pam_permit.so
        dest: /etc/pam.d/sudo
        owner: root
        group: root
        mode: '0644'
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Disable sudoers authentication (RedHat container)
      ansible.builtin.copy:
        content: 'Defaults !authenticate'
        dest: /etc/sudoers.d/molecule-no-auth
        owner: root
        group: root
        mode: '0440'
        validate: 'visudo -cf %s'
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Repository Setup
    #

    - name: Prepare | Install EPEL repository (RedHat)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Enable CRB repository (RedHat)
      ansible.builtin.command:
        cmd: dnf config-manager --set-enabled crb
      changed_when: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Enable contrib component (Debian)
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/debian.sources
        regexp: '^(Components: main)$'
        replace: '\1 contrib'
      when: ansible_facts['os_family'] == 'Debian'

    #
    # Package Cache Updates
    #

    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'
