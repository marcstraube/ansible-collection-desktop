---
driver:
  name: podman
platforms:
  - name: graphics-apps-archlinux
    image: docker.io/marcstraube/archlinux-ansible:latest
    pre_build_image: true
    command: /usr/lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: rw,nosuid,nodev,size=65536k
      /tmp: rw,nosuid,nodev
  - name: graphics-apps-debian-trixie
    image: docker.io/geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    command: /usr/lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: rw,nosuid,nodev,size=65536k
      /tmp: rw,nosuid,nodev
  - name: graphics-apps-rocky-9
    image: docker.io/geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    command: /usr/lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: rw,nosuid,nodev,size=65536k
      /tmp: rw,nosuid,nodev
  - name: graphics-apps-rocky-10
    image: docker.io/geerlingguy/docker-rockylinux10-ansible:latest
    pre_build_image: true
    command: /usr/lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: rw,nosuid,nodev,size=65536k
      /tmp: rw,nosuid,nodev
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    prepare: prepare.yml
    verify: verify.yml
  config_options:
    defaults:
      allow_broken_conditionals: true
  inventory:
    host_vars:
      graphics-apps-archlinux:
        ansible_python_interpreter: /usr/bin/python
      graphics-apps-debian-trixie:
        ansible_python_interpreter: /usr/bin/python3
      graphics-apps-rocky-9:
        ansible_python_interpreter: /usr/bin/python3
      graphics-apps-rocky-10:
        ansible_python_interpreter: /usr/bin/python3
verifier:
  name: ansible
scenario:
  test_sequence:
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
