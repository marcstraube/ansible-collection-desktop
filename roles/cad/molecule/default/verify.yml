---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    - name: Verify | Load OS-specific variables
      ansible.builtin.include_vars: '{{ item }}'
      with_first_found:
        - files:
            - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["distribution"] }}.yml'
            - '{{ ansible_facts["os_family"] }}.yml'
          paths:
            - '../../vars'

    - name: Verify | Check OpenSCAD installed (Arch)
      ansible.builtin.command:
        cmd: pacman -Q openscad
      register: __cad_openscad_check
      changed_when: false
      failed_when: __cad_openscad_check.rc != 0
      when:
        - ansible_facts['os_family'] == 'Archlinux'
        - __cad_openscad_package | default('') | length > 0

    - name: Verify | Check OpenSCAD installed (Debian)
      ansible.builtin.command:
        cmd: dpkg -l openscad
      register: __cad_openscad_check
      changed_when: false
      failed_when: __cad_openscad_check.rc != 0
      when:
        - ansible_facts['os_family'] == 'Debian'
        - __cad_openscad_package | default('') | length > 0

    - name: Verify | Check OpenSCAD installed (RedHat)  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: rpm -q openscad
      register: __cad_openscad_check
      changed_when: false
      failed_when: __cad_openscad_check.rc != 0
      when:
        - ansible_facts['os_family'] == 'RedHat'
        - __cad_openscad_package | default('') | length > 0

    - name: Verify | Check FreeCAD installed (Arch)
