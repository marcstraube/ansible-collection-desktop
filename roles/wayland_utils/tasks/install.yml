---
#
# Wayland Utils Installation
#

- name: Install | Build package list
  ansible.builtin.set_fact:
    __wayland_utils_packages: >-
      {{
        (wayland_utils_clipboard_enabled | bool | ternary(__wayland_utils_clipboard_packages, [])) +
        (wayland_utils_cliphist_enabled | bool | ternary([__wayland_utils_cliphist_package], [])) +
        (wayland_utils_grim_enabled | bool | ternary([__wayland_utils_grim_package], [])) +
        (wayland_utils_slurp_enabled | bool | ternary([__wayland_utils_slurp_package], [])) +
        (wayland_utils_swappy_enabled | bool | ternary([__wayland_utils_swappy_package], [])) +
        (wayland_utils_recorder_enabled | bool | ternary([__wayland_utils_recorder_package], [])) +
        (wayland_utils_screenrec_enabled | bool | ternary([__wayland_utils_screenrec_package], [])) +
        (wayland_utils_obs_enabled | bool | ternary(__wayland_utils_obs_packages, [])) +
        ([__wayland_utils_notification_packages[wayland_utils_notifications] | default('')]) +
        ([__wayland_utils_launcher_packages[wayland_utils_launcher] | default('')]) +
        ([__wayland_utils_bar_packages[wayland_utils_bar] | default('')]) +
        ([__wayland_utils_idle_packages[wayland_utils_idle] | default('')]) +
        ([__wayland_utils_locker_packages[wayland_utils_locker] | default('')]) +
        ([__wayland_utils_wallpaper_packages[wayland_utils_wallpaper] | default('')]) +
        (wayland_utils_matugen_enabled | bool | ternary([__wayland_utils_matugen_package], [])) +
        (wayland_utils_wlr_randr_enabled | bool | ternary([__wayland_utils_wlr_randr_package], [])) +
        (wayland_utils_kanshi_enabled | bool | ternary([__wayland_utils_kanshi_package], [])) +
        (wayland_utils_nwg_displays_enabled | bool | ternary([__wayland_utils_nwg_displays_package], [])) +
        ([__wayland_utils_portal_base]) +
        ([__wayland_utils_portal_packages[wayland_utils_portal] | default('')]) +
        (wayland_utils_brightnessctl_enabled | bool | ternary([__wayland_utils_brightnessctl_package], [])) +
        (wayland_utils_playerctl_enabled | bool | ternary([__wayland_utils_playerctl_package], [])) +
        (wayland_utils_quickshell_enabled | bool | ternary([__wayland_utils_quickshell_package], [])) +
        (wayland_utils_wev_enabled | bool | ternary([__wayland_utils_wev_package], [])) +
        (wayland_utils_wtype_enabled | bool | ternary([__wayland_utils_wtype_package], [])) +
        (wayland_utils_ydotool_enabled | bool | ternary([__wayland_utils_ydotool_package], []))
      }}

- name: Install | Filter empty package names
  ansible.builtin.set_fact:
    __wayland_utils_packages: >-
      {{ __wayland_utils_packages | select('string') | reject('equalto', '') | unique | list }}

- name: Install | Wayland utility packages
  ansible.builtin.package:
    name: '{{ __wayland_utils_packages }}'
    state: present
  when: __wayland_utils_packages | length > 0
  retries: 3
  delay: 5

- name: Install | Build AUR package list (Arch)
  ansible.builtin.set_fact:
    __wayland_utils_aur_install_list: >-
      {{
        (__wayland_utils_aur_bar_packages[wayland_utils_bar] | default([]))
        | flatten | select('string') | reject('equalto', '') | unique | list
      }}
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Install | AUR packages (Arch)
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: '{{ __wayland_utils_aur_install_list }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __wayland_utils_aur_install_list | length > 0
  retries: 3
  delay: 5
