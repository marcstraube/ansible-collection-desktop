---
- name: Prepare
  hosts: all
  gather_facts: true

  tasks:
    #
    # Package Cache
    #

    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Install RPM Fusion Free (RedHat)  # noqa: package-latest
      ansible.builtin.dnf:
        name: >-
          https://mirrors.rpmfusion.org/free/el/rpmfusion-free-release-{{
          ansible_facts['distribution_major_version'] }}.noarch.rpm
        state: present
        disable_gpg_check: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Arch Linux
    #

    - name: Prepare | Install base-devel and sudo (Arch)
      community.general.pacman:
        name:
          - base-devel
          - sudo
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Create aur_builder user (Arch)
      ansible.builtin.user:
        name: aur_builder
        group: wheel
        create_home: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Configure sudoers for aur_builder (Arch)
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/aur_builder
        line: 'aur_builder ALL=(ALL) NOPASSWD: ALL'
        create: true
        mode: '0440'
        validate: 'visudo -cf %s'
      when: ansible_facts['os_family'] == 'Archlinux'

    #
    # Container Dependencies
    #

    - name: Prepare | Install container dependencies (Debian)
      ansible.builtin.apt:
        name:
          - systemd
          - dbus
          - locales
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Replace curl-minimal with curl (RedHat)
      ansible.builtin.dnf:
        name:
          - curl
        state: present
        allowerasing: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install locale packages (RedHat)
      ansible.builtin.dnf:
        name:
          - glibc-langpack-en
          - glibc-locale-source
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Start D-Bus service (RedHat)
      ansible.builtin.systemd_service:
        name: dbus-broker
        state: started
      when: ansible_facts['os_family'] == 'RedHat'
