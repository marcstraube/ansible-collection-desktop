---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Prepare | Full system update (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Install base packages (Debian)
      ansible.builtin.apt:
        name:
          - systemd
          - procps
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Install base packages (RedHat)
      ansible.builtin.dnf:
        name:
          - systemd
          - procps-ng
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Replace curl-minimal with curl (RedHat)
      ansible.builtin.dnf:
        name:
          - curl
        state: present
        allowerasing: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install locale packages (RedHat)
      ansible.builtin.dnf:
        name:
          - glibc-langpack-en
          - glibc-locale-source
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Start D-Bus (RedHat)
      ansible.builtin.systemd_service:
        name: dbus-broker
        state: started
      when: ansible_facts['os_family'] == 'RedHat'
