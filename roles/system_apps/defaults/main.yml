---
#
# Role Control
#

# Enable the system_apps role
system_apps_enabled: true

#
# Disk Management
#

# GParted - Partition editor
system_apps_gparted_enabled: true

# Filelight - Disk usage visualizer
system_apps_filelight_enabled: true

# Baobab - GNOME disk usage analyzer
system_apps_baobab_enabled: false

#
# Hardware Management
#

# Solaar - Logitech device manager
system_apps_solaar_enabled: true

#
# System Monitoring
#

# GNOME System Monitor
system_apps_gnome_system_monitor_enabled: false

# Plasma System Monitor (replaces deprecated KSysGuard)
system_apps_plasma_system_monitor_enabled: false

#
# Backup and Sync
#

# Timeshift - System backup
system_apps_timeshift_enabled: false

# Deja Dup - GNOME backup tool
system_apps_deja_dup_enabled: false

#
# Utilities
#

# Seahorse - GNOME keyring manager
system_apps_seahorse_enabled: false

# dconf-editor - GNOME configuration editor
system_apps_dconf_editor_enabled: false
