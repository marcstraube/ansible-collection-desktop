---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sunday 07:00 UTC — catches upstream package drift
    # (EPEL / Arch repos / Debian) without code changes.
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  # =============================================================================
  # LINT (always runs)
  # =============================================================================
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install marcstraube.common community.general ansible.posix kewlfft.aur

      - name: Run ansible-lint
        run: ansible-lint

  # =============================================================================
  # MARKDOWN LINT (always runs)
  # =============================================================================
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24

  # =============================================================================
  # YAML LINT (always runs)
  # =============================================================================
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint .

  # =============================================================================
  # MOLECULE FORWARD-COMPATIBILITY (ansible-core 2.21, representative subset)
  # Tests a diverse subset of roles on latest ansible-core to catch
  # deprecations and breaking changes early.
  # =============================================================================
  molecule-compat:
    name: Compat ${{ matrix.role }} (ansible-2.21)
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { role: browser, platform: browser-archlinux }
          - { role: pipewire, platform: pipewire-archlinux }
          - { role: terminal, platform: terminal-archlinux }
          - { role: keepassxc, platform: keepassxc-archlinux }

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install "ansible-core~=2.21.0" \
                      molecule \
                      molecule-plugins[podman] \
                      passlib

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install marcstraube.common community.general ansible.posix kewlfft.aur containers.podman

      - name: Run Molecule test
        working-directory: roles/${{ matrix.role }}
        run: molecule test
        env:
          MOLECULE_PLATFORM_NAME: ${{ matrix.platform }}
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

  # =============================================================================
  # DETECT CHANGED ROLES
  # Determines which podman roles need molecule testing based on git diff.
  # Only substantive changes trigger tests (not README-only edits).
  # Shared file changes (galaxy.yml, plugins/, meta/runtime.yml) test all roles.
  # On schedule / workflow_dispatch: full matrix (all roles × all platforms)
  # to catch upstream package drift.
  # =============================================================================
  detect-changes:
    name: Detect Changed Roles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_roles: ${{ steps.set-matrix.outputs.has_roles }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Determine roles and platforms to test
        id: set-matrix
        run: |
          # Auto-detect podman roles from molecule driver config
          ALL_PODMAN_ROLES=""
          for f in roles/*/molecule/default/molecule.yml; do
            if grep -q 'name: podman' "$f"; then
              role=$(echo "$f" | cut -d/ -f2)
              ALL_PODMAN_ROLES="$ALL_PODMAN_ROLES $role"
            fi
          done

          # On schedule or manual dispatch: test everything
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "schedule" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Event '$EVENT' — full matrix (all roles × all platforms)"
            ROLES="$ALL_PODMAN_ROLES"
          else
            # Determine base commit for diff
            if [ "$EVENT" = "pull_request" ]; then
              BASE="${{ github.event.pull_request.base.sha }}"
            elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              BASE="${{ github.event.before }}"
            else
              echo "Initial or force push — testing all roles"
              BASE=""
            fi

            # If no valid base, test all podman roles
            if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
              ROLES="$ALL_PODMAN_ROLES"
            else
              CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}")

              # Shared files that require testing all roles
              if echo "$CHANGED" | grep -qE '^(galaxy\.yml|requirements\.yml|plugins/|meta/runtime\.yml)'; then
                echo "Shared files changed — testing all roles"
                ROLES="$ALL_PODMAN_ROLES"
              else
                # Find roles with substantive changes (skip README-only)
                ROLES=$(echo "$CHANGED" \
                  | grep '^roles/' \
                  | grep -v '/README\.md$' \
                  | sed 's|^roles/\([^/]*\)/.*|\1|' \
                  | sort -u \
                  | tr '\n' ' ')

                # Filter to podman roles only
                FILTERED=""
                for role in $ROLES; do
                  if echo " $ALL_PODMAN_ROLES " | grep -q " $role "; then
                    FILTERED="$FILTERED $role"
                  fi
                done
                ROLES="$FILTERED"
              fi
            fi
          fi

          # Build JSON matrix: one entry per (role, scenario, platform).
          # All molecule scenarios (default plus extras like 'comfyui') are
          # discovered; platforms come from each scenario's molecule.yml so
          # roles with fewer platforms (elgato, tuxedo, wine) get fewer
          # entries. Only podman scenarios run here — others are skipped.
          MATRIX="["
          FIRST=true
          for role in $ROLES; do
            [ -z "$role" ] && continue
            for scenario_dir in roles/$role/molecule/*/; do
              scenario=$(basename "$scenario_dir")
              mol="${scenario_dir}molecule.yml"
              [ -f "$mol" ] || continue
              grep -q 'name: podman' "$mol" || continue
              platforms=$(python3 -c "
          import yaml, sys
          with open(sys.argv[1]) as f:
              data = yaml.safe_load(f)
          for p in data.get('platforms', []):
              print(p['name'])
          " "$mol")
              for platform in $platforms; do
                if [ "$FIRST" = "true" ]; then
                  FIRST=false
                else
                  MATRIX="${MATRIX},"
                fi
                MATRIX="${MATRIX}{\"role\":\"${role}\",\"scenario\":\"${scenario}\",\"platform\":\"${platform}\"}"
              done
            done
          done
          MATRIX="${MATRIX}]"

          if [ "$MATRIX" = "[]" ]; then
            echo "has_roles=false" >> "$GITHUB_OUTPUT"
            echo "No roles to test"
          else
            echo "has_roles=true" >> "$GITHUB_OUTPUT"
            echo "Roles to test: $ROLES"
            echo "Matrix entries: $(echo "$MATRIX" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          fi

          echo "matrix={\"include\":${MATRIX}}" >> "$GITHUB_OUTPUT"

  # =============================================================================
  # MOLECULE ROLE × PLATFORM (changed roles × all their platforms;
  # full matrix on schedule / workflow_dispatch)
  # =============================================================================
  molecule-roles:
    name: Molecule ${{ matrix.role }} / ${{ matrix.scenario }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint, detect-changes]
    if: needs.detect-changes.outputs.has_roles == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install "ansible-core~=2.19.0" \
                      molecule \
                      molecule-plugins[podman] \
                      passlib

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install marcstraube.common community.general ansible.posix kewlfft.aur containers.podman

      - name: Run Molecule test
        working-directory: roles/${{ matrix.role }}
        run: molecule test -s ${{ matrix.scenario }}
        env:
          MOLECULE_PLATFORM_NAME: ${{ matrix.platform }}
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

  # =============================================================================
  # BUILD (always runs)
  # =============================================================================
  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Ansible
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: collection-tarball
          path: '*.tar.gz'
          retention-days: 30

  # =============================================================================
  # MIGRATION DOC CHECK (PR only)
  # Fails any PR whose commits include a Conventional-Commit breaking
  # marker (`<type>!:` headline or `BREAKING CHANGE:` footer) without a
  # MIGRATION.md change. No bypass: the `!` marker is reserved for actual
  # contract violations; if it was set incorrectly the commit message
  # must be rewritten, not the gate skipped.
  # =============================================================================
  migration-doc-check:
    name: MIGRATION.md doc check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Enforce MIGRATION.md update on breaking-change PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # All commit messages on the PR (headline + body), paginated.
          COMMITS=$(gh api -X GET "repos/${REPO}/pulls/${PR_NUMBER}/commits" \
            --paginate --jq '.[].commit.message')

          # Conventional-Commit breaking marker:
          # - `<type>!:` or `<type>(<scope>)!:` at the start of any line
          # - `BREAKING CHANGE:` at the start of any line
          if ! grep -qE '(^[a-z]+(\([^)]+\))?!:|^BREAKING CHANGE:)' <<< "$COMMITS"; then
            echo "No breaking-change commits in this PR — nothing to enforce."
            exit 0
          fi

          echo "Breaking-change commit detected. Checking MIGRATION.md diff…"

          # All changed files on the PR, paginated.
          FILES=$(gh api -X GET "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --paginate --jq '.[].filename')

          if grep -Fxq 'MIGRATION.md' <<< "$FILES"; then
            echo "MIGRATION.md is modified — check passes."
            exit 0
          fi

          echo "::error::Breaking-change PR must update MIGRATION.md."
          cat <<'EOF'
          Detected at least one breaking-change commit (Conventional-Commit
          `!` marker or BREAKING CHANGE: footer) but MIGRATION.md is not
          modified by this PR. Pick one of the two paths:

          1. The `!` marker is correct — the change really breaks an
             inventory contract. Add a sub-section under the persistent
             `## Unreleased` heading in MIGRATION.md describing the change
             and the required inventory action. See the Migration Guide
             intro for the convention.

          2. The `!` marker is wrong — the change is additive, a no-op
             removal of dead code, or merely implements documented intent.
             Rewrite the commit message (`git rebase -i`, drop the `!`,
             remove any `BREAKING CHANGE:` footer) and force-push. The `!`
             marker is reserved strictly for actual contract violations.
          EOF
          exit 1

  # =============================================================================
  # CI GATE (single required check for branch protection)
  # =============================================================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, markdown-lint, yaml-lint, build, molecule-compat, molecule-roles, migration-doc-check]
    steps:
      - name: Check required job results
        run: |
          # molecule-roles may be skipped when no roles changed;
          # migration-doc-check is skipped on push to main (PR-only).
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.markdown-lint.result }}"
            "${{ needs.yaml-lint.result }}"
            "${{ needs.build.result }}"
            "${{ needs.molecule-compat.result }}"
            "${{ needs.molecule-roles.result }}"
            "${{ needs.migration-doc-check.result }}"
          )
          for r in "${results[@]}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::Required job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All required jobs passed (or were skipped)."
