---
driver:
  name: podman
platforms:
  - name: desktop-${MOLECULE_DISTRO:-debian-trixie}
    image: ${MOLECULE_IMAGE:-geerlingguy/docker-debian13-ansible:latest}
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
    tmpfs:
      /run: rw,nosuid,nodev,size=65536k
      /tmp: rw,nosuid,nodev
provisioner:
  name: ansible
  config_options:
    defaults:
      allow_broken_conditionals: true
verifier:
  name: ansible
