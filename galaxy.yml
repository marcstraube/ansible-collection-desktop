---
namespace: marcstraube
name: desktop
version: 2.1.0 # x-release-please-version
readme: README.md
authors:
  - Marc Straube <email@marcstraube.de>
description: >-
  27 desktop workstation roles for Arch Linux, Debian Trixie, and
  Rocky Linux 9/10. Desktop environments, display managers, browsers,
  development tools, multimedia, office, and productivity applications.
  Built for ansible-core 2.19+.
license_file: LICENSE
tags:
  - linux
  - archlinux
  - debian
  - desktop
  - workstation
  - hyprland
  - wayland
  - development
  - multimedia
  - browser
  - wine
  - security
repository: https://github.com/marcstraube/ansible-collection-desktop
documentation: https://github.com/marcstraube/ansible-collection-desktop
homepage: https://github.com/marcstraube/ansible-collection-desktop
issues: https://github.com/marcstraube/ansible-collection-desktop/issues
build_ignore:
  - '*.tar.gz'
  - '.ansible'
  - '.ansible-lint'
  - '.claude'
  - '.git'
  - '.github'
  - '.gitignore'
  - '.markdownlint-cli2.yaml'
  - '.markdownlint.yml'
  - '.pre-commit-config.yaml'
  - '.release-please-manifest.json'
  - '.secrets.baseline'
  - '.venv'
  - '.yamllint'
  - '*.pyc'
  - '__pycache__'
  - 'roles/*/molecule'
dependencies:
  marcstraube.common: '>=2.0.0'
  community.general: '>=8.0.0'
  ansible.posix: '>=1.5.0'
  kewlfft.aur: '>=0.11.0'
